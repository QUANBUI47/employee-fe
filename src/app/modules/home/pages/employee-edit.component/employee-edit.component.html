<div class="px-4 py-6 max-w-4xl mx-auto sm:px-6 lg:px-8 space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:truncate sm:text-3xl sm:tracking-tight">
      Chỉnh sửa nhân viên
    </h2>
    <button (click)="goBack()" type="button" class="inline-flex items-center justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
      Quay lại danh sách
    </button>
  </div>

  <!-- Messages -->
  <div *ngIf="message" [ngClass]="{'bg-green-50 text-green-800 border-green-200': message.type === 'success', 'bg-red-50 text-red-800 border-red-200': message.type === 'error'}" class="border rounded-md p-4 mb-4">
    <p class="text-sm font-medium">{{ message.text }}</p>
  </div>

  <div *ngIf="isLoading" class="flex justify-center items-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
  </div>

  <form *ngIf="!isLoading" [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="bg-white shadow sm:rounded-lg overflow-hidden border border-gray-200">
    <div class="px-4 py-5 sm:p-6 text-left">
      <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
        
        <div class="sm:col-span-3">
          <label for="name" class="block text-sm font-medium text-gray-700">Họ và tên</label>
          <div class="mt-1">
            <input type="text" formControlName="name" id="name" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            <div *ngIf="employeeForm.get('name')?.touched && employeeForm.get('name')?.invalid" class="text-red-500 text-xs mt-1">Họ tên là bắt buộc</div>
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="dob" class="block text-sm font-medium text-gray-700">Ngày sinh (YYYY-MM-DD)</label>
          <div class="mt-1">
            <input type="date" formControlName="dob" id="dob" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            <div *ngIf="employeeForm.get('dob')?.touched && employeeForm.get('dob')?.invalid" class="text-red-500 text-xs mt-1">Ngày sinh là bắt buộc</div>
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="phone" class="block text-sm font-medium text-gray-700">Số điện thoại</label>
          <div class="mt-1">
            <input type="text" formControlName="phone" id="phone" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            <div *ngIf="employeeForm.get('phone')?.touched && employeeForm.get('phone')?.invalid" class="text-red-500 text-xs mt-1">Số điện thoại là bắt buộc</div>
          </div>
        </div>

        <div class="sm:col-span-6">
          <label for="address" class="block text-sm font-medium text-gray-700">Địa chỉ</label>
          <div class="mt-1">
            <input type="text" formControlName="address" id="address" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            <div *ngIf="employeeForm.get('address')?.touched && employeeForm.get('address')?.invalid" class="text-red-500 text-xs mt-1">Địa chỉ là bắt buộc</div>
          </div>
        </div>
        
        <div class="sm:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">Ngoại ngữ (Hiện tại)</label>
          <div class="bg-gray-50 rounded-md border border-gray-200 overflow-hidden">
            <ul class="divide-y divide-gray-200">
              <li *ngFor="let lang of employeeForm.get('languages')?.value" class="px-4 py-3 flex justify-between items-center bg-white hover:bg-gray-50 transition-colors">
                <span class="text-sm font-medium text-gray-900">{{lang.name}}</span>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                  {{lang.level}}
                </span>
              </li>
              <li *ngIf="!employeeForm.get('languages')?.value?.length" class="px-4 py-3 text-sm text-gray-500 italic">
                Chưa có ngoại ngữ nào
              </li>
            </ul>
          </div>
        </div>

        <div class="sm:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">Chứng chỉ (Hiện tại)</label>
          <div class="bg-gray-50 rounded-md border border-gray-200 overflow-hidden">
            <ul class="divide-y divide-gray-200">
              <li *ngFor="let cert of employeeForm.get('certificates')?.value" class="px-4 py-3 flex items-center bg-white hover:bg-gray-50 transition-colors">
                <svg class="h-5 w-5 text-indigo-500 mr-2" xmlns="http://www.w3.org/0000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm3.707 9.293a1 1 0 00-1.414-1.414L9 13.586l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                <span class="text-sm font-medium text-gray-900">{{cert.name}}</span>
              </li>
              <li *ngIf="!employeeForm.get('certificates')?.value?.length" class="px-4 py-3 text-sm text-gray-500 italic">
                Chưa có chứng chỉ nào
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>
    
    <div class="bg-gray-50 px-4 py-3 sm:px-6 flex justify-end gap-3 border-t border-gray-200">
      <button type="button" (click)="loadEmployee()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Khôi phục (Reset)
      </button>
      <button type="submit" [disabled]="isSaving" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 min-w-[120px]">
        <span *ngIf="!isSaving">Lưu thay đổi</span>
        <div *ngIf="isSaving" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/0000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Đang xử lý...
        </div>
      </button>
    </div>
  </form>
</div>
